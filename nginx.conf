server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to Evolution API (avoids CORS)
    location /api/ {
        proxy_pass https://whatsapp.webcreatia.site/;
        proxy_http_version 1.1;
        proxy_set_header Host whatsapp.webcreatia.site;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # Serve the dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Cache static assets
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Disable access log for favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
